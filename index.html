<html lang="id">
<head>
    <meta charset="UTF-8">

    <!-- Libraries -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --accent: #00f2ff;
            --secondary: #7000ff;
            --bg-dark: #030303;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; overflow-x: hidden;
        }

        /* 3D Background - Layer paling belakang */
        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1; 
            pointer-events: none; /* Penting: Agar tidak menghalangi klik */
        }

        /* Content Wrapper - Di atas background */
        #main-wrapper {
            position: relative;
            z-index: 10;
        }

        /* Navbar Glassmorphism */
        .navbar {
            backdrop-filter: blur(20px);
            background: rgba(3, 3, 3, 0.7);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
        }

        .navbar-brand {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700; font-size: 1.8rem;
        }

        /* Hero HUD Style */
        .hero-section {
            min-height: 100vh;
            display: flex; align-items: center;
            padding: 150px 0 100px;
        }

        .hero-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3rem, 8vw, 6.5rem);
            font-weight: 700; line-height: 0.85;
            background: linear-gradient(to bottom, #fff 40%, rgba(255,255,255,0.2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Bento Grid 3D Tilt */
        .bento-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 40px;
            height: 100%;
            position: relative;
            backdrop-filter: blur(15px);
            transform-style: preserve-3d;
            transform: perspective(1000px);
            transition: border-color 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .bento-card:hover {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Efek Glow Neon di dalam Card */
        .bento-card::after {
            content: '';
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at var(--x) var(--y), rgba(0,242,255,0.1), transparent 40%);
            border-radius: 35px; opacity: 0; transition: opacity 0.3s;
            pointer-events: none;
        }

        .bento-card:hover::after { opacity: 1; }

        .card-icon {
            font-size: 3rem; color: var(--accent); margin-bottom: 25px;
            filter: drop-shadow(0 0 15px var(--accent));
            transform: translateZ(50px); /* Efek 3D mengapung */
        }

        /* BUTTONS - Harus bisa diklik */
        .btn-glow {
            background: var(--accent);
            color: #000 !important;
            font-weight: 800;
            padding: 14px 30px;
            border-radius: 14px;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            position: relative;
            z-index: 100; /* Pastikan di atas card hover effect */
        }

        .btn-glow:hover {
            transform: translateZ(30px) scale(1.05);
            box-shadow: 0 0 30px var(--accent);
        }

        .btn-outline-web3 {
            background: transparent;
            color: var(--accent) !important;
            border: 1px solid var(--accent);
            font-weight: 700;
            padding: 13px 30px;
            border-radius: 14px;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
            position: relative;
            z-index: 100;
        }

        .btn-outline-web3:hover {
            background: rgba(0, 242, 255, 0.1);
            color: #fff !important;
            transform: translateZ(30px);
        }

        /* Profile & Alamat */
        .profile-container {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 50px;
            margin-top: 50px;
        }

        .address-info i { color: var(--accent); width: 30px; }

        .tech-badge {
            font-size: 10px; font-weight: 800; padding: 6px 15px;
            background: rgba(0,242,255,0.1); color: var(--accent);
            border-radius: 100px; margin-right: 8px;
            border: 1px solid rgba(0,242,255,0.2);
        }

        footer {
            padding: 60px 0; border-top: 1px solid var(--glass-border);
            text-align: center; color: #444; font-size: 14px;
        }

        /* Hide Scrollbar but keep functionality */
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
